spring.application.name=gestion-guias-despacho
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:guiasdb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_B2C_ISSUER_URI:https://sts.windows.net/1c1bef63-cd8e-4b9e-bf4f-7be6677967ad/}

app.storage.local-path=${GUIAS_STORAGE_PATH:/tmp/guias-despacho}
app.s3.enabled=${S3_ENABLED:false}
app.s3.bucket=${S3_BUCKET:guias-despacho-demo}
app.s3.region=${AWS_REGION:us-east-1}
app.rabbit.cola-guias=${RABBIT_COLA_GUIAS:guias.cola1}
app.rabbit.cola-errores=${RABBIT_COLA_ERRORES:guias.cola2.errores}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
