spring.application.name=gestion-guias-despacho
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:guiasdb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_B2C_ISSUER_URI:https://example.b2clogin.com/example.onmicrosoft.com/B2C_1_signupsignin/v2.0/}

app.storage.local-path=${GUIAS_STORAGE_PATH:/tmp/guias-despacho}
app.s3.enabled=${S3_ENABLED:false}
app.s3.bucket=${S3_BUCKET:guias-despacho-demo}
app.s3.region=${AWS_REGION:us-east-1}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
