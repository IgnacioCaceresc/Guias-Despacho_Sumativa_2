name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "/home/ec2-user/Guias-Despacho_Sumativa_2" ]; then
              git clone https://github.com/IgnacioCaceresc/Guias-Despacho_Sumativa_2.git /home/ec2-user/Guias-Despacho_Sumativa_2
            fi
            cd /home/ec2-user/Guias-Despacho_Sumativa_2
            git pull origin main
            export S3_BUCKET=${{ secrets.S3_BUCKET }}
            export S3_ENABLED=true
            export AWS_REGION=us-east-1
            sudo docker-compose down
            sudo docker-compose up -d --build