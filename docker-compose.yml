services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: gestion-guias-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-guest}"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  guias-api:
    build: .
    container_name: gestion-guias-despacho
    depends_on:
      - rabbitmq
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      AZURE_B2C_ISSUER_URI: "https://sts.windows.net/1c1bef63-cd8e-4b9e-bf4f-7be6677967ad/"
      GUIAS_STORAGE_PATH: "/data/guias"
      S3_ENABLED: "${S3_ENABLED:-false}"
      S3_BUCKET: "${S3_BUCKET:-guias-despacho-demo}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      APP_SECURITY_ENABLED: "${APP_SECURITY_ENABLED:-true}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: "${RABBITMQ_USERNAME:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      RABBIT_COLA_GUIAS: "${RABBIT_COLA_GUIAS:-guias.cola1}"
      RABBIT_COLA_ERRORES: "${RABBIT_COLA_ERRORES:-guias.cola2.errores}"
    volumes:
      - guias-data:/data/guias

volumes:
  guias-data:
  rabbitmq-data:
